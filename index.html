<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess vs Bot + Lichess Puzzle</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2f3942;
font-family:Arial;
overflow:hidden;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.turn{
color:white;
font-size:22px;
font-weight:bold;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.board{
width:340px;
height:340px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.7);
}

.square{
display:flex;
justify-content:center;
align-items:center;
position:relative;
cursor:pointer;
}

.white{background:#d7d4c0;}
.black{background:#0F172A;}

.square img{
width:85%;
height:85%;
pointer-events:none;
}

.highlight::after{
content:"";
width:18px;
height:18px;
border-radius:50%;
background:rgba(0,255,100,0.7);
position:absolute;
}
</style>
</head>

<body>

<div class="container">

<div class="turn" id="turnText">White to move</div>

<button onclick="loadPuzzle()">New Puzzle</button>

<div class="board" id="board"></div>

</div>

<script>

const board=document.getElementById("board");
const turnText=document.getElementById("turnText");
const files="abcdefgh";

let currentTurn="w";
let selectedPiece=null;
let legalMoves=[];
let enPassantSquare=null;

let puzzleMode=false;
let puzzleMoves=[];
let puzzleIndex=0;

function pieceImg(type){
return `https://images.chesscomfiles.com/chess-themes/pieces/classic/150/${type}.png`;
}

/* ---------------- PIECES ---------------- */

let pieces={};

function setStartPosition(){
pieces={
WR1:{type:"wr",square:"a1"},WN1:{type:"wn",square:"b1"},
WB1:{type:"wb",square:"c1"},WQ:{type:"wq",square:"d1"},
WK:{type:"wk",square:"e1"},WB2:{type:"wb",square:"f1"},
WN2:{type:"wn",square:"g1"},WR2:{type:"wr",square:"h1"},

WP1:{type:"wp",square:"a2"},WP2:{type:"wp",square:"b2"},
WP3:{type:"wp",square:"c2"},WP4:{type:"wp",square:"d2"},
WP5:{type:"wp",square:"e2"},WP6:{type:"wp",square:"f2"},
WP7:{type:"wp",square:"g2"},WP8:{type:"wp",square:"h2"},

BR1:{type:"br",square:"a8"},BN1:{type:"bn",square:"b8"},
BB1:{type:"bb",square:"c8"},BQ:{type:"bq",square:"d8"},
BK:{type:"bk",square:"e8"},BB2:{type:"bb",square:"f8"},
BN2:{type:"bn",square:"g8"},BR2:{type:"br",square:"h8"},

BP1:{type:"bp",square:"a7"},BP2:{type:"bp",square:"b7"},
BP3:{type:"bp",square:"c7"},BP4:{type:"bp",square:"d7"},
BP5:{type:"bp",square:"e7"},BP6:{type:"bp",square:"f7"},
BP7:{type:"bp",square:"g7"},BP8:{type:"bp",square:"h7"}
};
}

/* ---------------- FEN ---------------- */

function loadFEN(fen){
setStartPosition();

let rows=fen.split(" ")[0].split("/");

pieces={};

let id=0;

for(let r=0;r<8;r++){
let row=rows[r];
let file=0;

for(let ch of row){
if(!isNaN(ch)){
file+=parseInt(ch);
}else{
let color=ch===ch.toUpperCase()?"w":"b";
let type=ch.toLowerCase();

let sq=files[file]+(r+1);

pieces["p"+id++]={type:color+type,square:sq};

file++;
}
}
}
}

/* ---------------- HELPERS ---------------- */

function squareToCoords(sq){
return [8-parseInt(sq[1]),files.indexOf(sq[0])];
}

function coordsToSquare(r,c){
return files[c]+(8-r);
}

function getPieceAt(sq){
for(let id in pieces){
if(pieces[id].square===sq) return pieces[id];
}
return null;
}

function inside(r,c){
return r>=0&&r<8&&c>=0&&c<8;
}

/* ---------------- MOVES ---------------- */

function getMoves(piece){
let type=piece.type;
let color=type[0];
let [r,c]=squareToCoords(piece.square);

let moves=[];

if(type[1]==="p"){
let dir=color==="w"?-1:1;
let nr=r+dir;
if(inside(nr,c)){
let sq=coordsToSquare(nr,c);
if(!getPieceAt(sq)) moves.push(sq);
}
}

return moves;
}

/* ---------------- MOVE ---------------- */

function movePiece(piece,to){

for(let id in pieces){
if(pieces[id].square===to) delete pieces[id];
}

piece.square=to;
currentTurn=currentTurn==="w"?"b":"w";
turnText.innerText=currentTurn==="w"?"White to move":"Black to move";

/* puzzle check */
if(puzzleMode){
checkPuzzleMove(to);
}
}

/* ---------------- PUZZLE ---------------- */

async function loadPuzzle(){

let res=await fetch("https://lichess.org/api/puzzle/daily");
let data=await res.json();

let fen=data.game.fen;
let line=data.puzzle.solution;

puzzleMoves=line;
puzzleIndex=0;
puzzleMode=true;

loadFEN(fen);

turnText.innerText="Solve Puzzle";

draw();
}

/* check puzzle move */
function checkPuzzleMove(move){

if(puzzleMoves[puzzleIndex]===move){
puzzleIndex++;

if(puzzleIndex>=puzzleMoves.length){
turnText.innerText="Solved!";
puzzleMode=false;
return;
}

/* auto opponent move */
setTimeout(()=>{
let oppMove=puzzleMoves[puzzleIndex];
puzzleIndex++;

autoMove(oppMove);
},500);

}else{
turnText.innerText="Wrong move!";
}
}

function autoMove(move){

for(let id in pieces){
if(pieces[id].square===move.slice(0,2)){
movePiece(pieces[id],move.slice(2,4));
break;
}
}

draw();
}

/* ---------------- DRAW ---------------- */

function draw(){

board.innerHTML="";

for(let r=8;r>=1;r--){
for(let c=0;c<8;c++){

let sq=files[c]+r;

let div=document.createElement("div");
div.className="square "+(((r+c)%2)?"white":"black");

div.onclick=()=>handleClick(sq);

let p=getPieceAt(sq);
if(p){
let img=document.createElement("img");
img.src=pieceImg(p.type);
div.appendChild(img);
}

board.appendChild(div);
}
}
}

/* ---------------- CLICK ---------------- */

function handleClick(sq){

if(!selectedPiece){
let p=getPieceAt(sq);
if(p&&p.type[0]==="w"){
selectedPiece=p;
}
draw();
return;
}

movePiece(selectedPiece,sq);
selectedPiece=null;
draw();
}

setStartPosition();
draw();

</script>

</body>
</html>
