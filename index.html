<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Royal Comment Box</title>

<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #8b0000, #3b0000);
    font-family: Arial, sans-serif;
  }

  .container{
    width: 420px;
    background: rgba(0,0,0,0.35);
    border: 2px solid #ffd700;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(255,215,0,0.4);
    padding: 15px;
    backdrop-filter: blur(6px);
  }

  h2{
    text-align:center;
    color:#ffd700;
    margin-bottom:10px;
    letter-spacing:1px;
  }

  textarea{
    width:100%;
    height:80px;
    border-radius:10px;
    border:1px solid #ffd700;
    padding:10px;
    resize:none;
    outline:none;
    background:#1a0000;
    color:#fff;
  }

  button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#ffd700;
    color:#3b0000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  }

  button:hover{
    background:#ffcc00;
  }

  .comments{
    margin-top:15px;
    max-height:200px;
    overflow-y:auto;
    border-top:1px solid #ffd700;
    padding-top:10px;
  }

  .comment{
    background: rgba(255,255,255,0.08);
    padding:8px;
    border-radius:8px;
    margin-bottom:8px;
    color:#fff;
    font-size:14px;
    border-left:3px solid #ffd700;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Royal Message Box</h2>

  <textarea id="input" placeholder="Write your message..."></textarea>
  <button onclick="addComment()">Post Message</button>

  <div class="comments" id="comments"></div>
</div>

<script>
  let comments = JSON.parse(localStorage.getItem("comments")) || [];

  function render(){
    const box = document.getElementById("comments");
    box.innerHTML = "";
    comments.forEach(c => {
      const div = document.createElement("div");
      div.className = "comment";
      div.textContent = c;
      box.appendChild(div);
    });
  }

  function addComment(){
    const input = document.getElementById("input");
    const text = input.value.trim();

    if(text === "") return;

    comments.push(text);
    localStorage.setItem("comments", JSON.stringify(comments));

    input.value = "";
    render();
  }

  render();
</script>

</body>
</html>
