<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050b1a;
  font-family:Arial;
  overflow:hidden;
}

.board-wrapper{
  position:relative;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid #020617;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* SOFT EYE-RELAXING COLORS */
.white{
  background:linear-gradient(145deg,#e8eef5,#cfd8e3);
}

.black{
  background:linear-gradient(145deg,#4b6584,#2f4858);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
}

/* coordinates */
.coord{
  position:absolute;
  font-size:12px;
  color:#cbd5e1;
  font-weight:bold;
}

.file{
  bottom:-22px;
}

.rank{
  left:-20px;
}

/* title */
.title{
  position:absolute;
  top:-45px;
  left:0;
  color:white;
  font-size:15px;
  font-weight:bold;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="board-wrapper">

  <div class="title">
    Magnus Carlsen vs Veselin Topalov (2010)
  </div>

  <div class="board" id="board"></div>

</div>

<script>

/* PIECES */
const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",

  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

/* START POSITION */
const startState = [
  "r","n","b","q","k","b","n","r",
  "p","p","p","p","p","p","p","p",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "P","P","P","P","P","P","P","P",
  "R","N","B","Q","K","B","N","R"
];

let state = [...startState];

const board = document.getElementById("board");

/* MOVES */
const moves = [

[52,36],[11,27],
[36,27],[3,27],
[57,42],[27,24],
[51,35],[6,21],
[62,45],[10,18],
[61,34],[2,29],
[34,43],[12,20],
[59,52],[29,38],
castleWhite(),
[1,18],
[43,34],
castleBlack(),
[55,39],
[8,16],
[45,28]

];

/* CASTLING */
function castleWhite(){
  return ["castleWhite"];
}

function castleBlack(){
  return ["castleBlack"];
}

/* DRAW */
function draw(){

  board.innerHTML = "";

  state.forEach((p,i)=>{

    const sq = document.createElement("div");

    const r = Math.floor(i/8);
    const c = i%8;

    sq.className =
      "square " + ((r+c)%2 ? "black" : "white");

    if(p){
      const im = document.createElement("img");
      im.className = "piece";
      im.src = img[p];
      sq.appendChild(im);
    }

    board.appendChild(sq);

  });

}

/* COORDINATES */
function addCoords(){

  const wrapper = document.querySelector(".board-wrapper");

  const files = ["A","B","C","D","E","F","G","H"];

  for(let i=0;i<8;i++){

    const f = document.createElement("div");

    f.className = "coord file";
    f.style.left = (i*52 + 30) + "px";
    f.textContent = files[i];

    wrapper.appendChild(f);
  }

  for(let i=0;i<8;i++){

    const r = document.createElement("div");

    r.className = "coord rank";
    r.style.top = (i*52 + 30) + "px";
    r.textContent = 8-i;

    wrapper.appendChild(r);
  }
}

addCoords();

/* RESET */
function resetBoard(){

  state = [...startState];
  moveIndex = 0;
  draw();
}

/* PLAY LOOP */
let moveIndex = 0;

function play(){

  if(moveIndex >= moves.length){

    setTimeout(()=>{
      resetBoard();
      play();
    },2500);

    return;
  }

  setTimeout(()=>{

    const move = moves[moveIndex];

    if(move[0] === "castleWhite"){

      state[62] = state[60];
      state[60] = "";

      state[61] = state[63];
      state[63] = "";
    }

    else if(move[0] === "castleBlack"){

      state[6] = state[4];
      state[4] = "";

      state[5] = state[7];
      state[7] = "";
    }

    else{

      const [from,to] = move;

      state[to] = state[from];
      state[from] = "";
    }

    draw();

    moveIndex++;

    play();

  },700);
}

/* START */
draw();
play();

</script>

</body>
</html>
