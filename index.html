<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offline Chess Puzzles</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2f3942;
font-family:Arial;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.board{
width:360px;
height:360px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border-radius:10px;
overflow:hidden;
}

.square{
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
}

.light{background:#d7d4c0;}
.dark{background:#0f172a;color:white;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.turn{
color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="turn" id="status">Loading</div>
<button onclick="loadPuzzle()">New Puzzle</button>

<div class="board" id="board"></div>

</div>

<script>

/* ---------- BASIC STATE ---------- */

let board=[];
let selected=null;

let puzzle=[];
let index=0;

const files="abcdefgh";

const pieces={
p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",
P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔"
};

/* ---------- SIMPLE FEN LOADER ---------- */

function loadFEN(fen){
board=[];
let rows=fen.split(" ")[0].split("/");

for(let r=0;r<8;r++){
let row=[];
for(let c=0;c<8;c++) row[c]=null;

let file=0;
for(let ch of rows[r]){
if(!isNaN(ch)){
file+=parseInt(ch);
}else{
row[file]=ch;
file++;
}
}
board[r]=row;
}
}

/* ---------- DRAW ---------- */

const el=document.getElementById("board");
const status=document.getElementById("status");

function draw(){
el.innerHTML="";

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let sq=document.createElement("div");
sq.className="square "+((r+c)%2?"dark":"light");

let p=board[r][c];
if(p) sq.innerText=pieces[p];

sq.onclick=()=>click(r,c);

el.appendChild(sq);
}
}

status.innerText="Solve puzzle";
}

/* ---------- CLICK ---------- */

function click(r,c){

if(!selected){
selected={r,c};
return;
}

let from=selected;
let to={r,c};

movePiece(from,to);

selected=null;
draw();
}

/* ---------- MOVE (VERY SIMPLIFIED) ---------- */

function movePiece(from,to){

let p=board[from.r][from.c];
if(!p) return;

board[to.r][to.c]=p;
board[from.r][from.c]=null;

let uci=
files[from.c]+(8-from.r)+files[to.c]+(8-to.r);

checkPuzzle(uci);
}

/* ---------- PUZZLE ---------- */

function checkPuzzle(uci){

if(puzzle[index]===uci){
index++;

if(index>=puzzle.length){
status.innerText="Solved!";
return;
}

/* auto opponent */
setTimeout(()=>{
let m=puzzle[index];
autoMove(m);
index++;
},400);

}else{
status.innerText="Wrong move!";
}
}

function autoMove(uci){

let f=uci.slice(0,2);
let t=uci.slice(2,4);

let from={r:8-parseInt(f[1]),c:files.indexOf(f[0])};
let to={r:8-parseInt(t[1]),c:files.indexOf(t[0])};

board[to.r][to.c]=board[from.r][from.c];
board[from.r][from.c]=null;

draw();
}

/* ---------- PUZZLE LOADER ---------- */

async function loadPuzzle(){

status.innerText="Loading...";

let res=await fetch("https://lichess.org/api/puzzle/daily");
let data=await res.json();

loadFEN(data.game.fen);

puzzle=data.puzzle.solution;
index=0;

draw();
}

/* START */

loadPuzzle();

</script>

</body>
</html>
