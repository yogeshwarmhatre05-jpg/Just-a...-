<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #8b0000, #1a0000);
  font-family:Arial;
}

/* MAIN WRAPPER */
.main{
  width:300px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* ================= CHESS ================= */

.board-wrapper{
  position:relative;
}

.board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:6px solid #ffd700;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  border-radius:10px;
}

.white{
  background:linear-gradient(145deg,#e8eef5,#cfd8e3);
}

.black{
  background:linear-gradient(145deg,#4b6584,#2f4858);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  user-select:none;
  pointer-events:none;
}

/* coords */
.coord{
  position:absolute;
  font-size:10px;
  color:#ffd700;
  font-weight:bold;
}

.file{ bottom:-18px; }
.rank{ left:-16px; }

.title{
  position:absolute;
  top:-35px;
  left:0;
  color:#ffd700;
  font-size:12px;
  font-weight:bold;
}

/* ================= MESSAGE BOX ================= */

.container{
  width:300px;
  background: rgba(0,0,0,0.35);
  border: 2px solid #ffd700;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(255,215,0,0.25);
  padding: 10px;
}

h2{
  text-align:center;
  color:#ffd700;
  margin:5px 0 8px;
  font-size:16px;
}

/* auto expanding textarea */
textarea{
  width:100%;
  min-height:50px;
  max-height:140px;
  border-radius:8px;
  border:1px solid #ffd700;
  padding:8px;
  resize:none;
  outline:none;
  background:#1a0000;
  color:#fff;
  overflow:hidden;
}

button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#ffd700;
  color:#3b0000;
  font-weight:bold;
  cursor:pointer;
}

/* comments */
.comments{
  margin-top:10px;
  max-height:180px;
  overflow-y:auto;
  border-top:1px solid #ffd700;
  padding-top:8px;
}

.comment{
  position:relative;
  background: rgba(255,255,255,0.08);
  padding:8px 30px 8px 8px;
  border-radius:8px;
  margin-bottom:8px;
  color:#fff;
  font-size:13px;
  border-left:3px solid #ffd700;
  word-wrap:break-word;
}

/* delete button */
.delete{
  position:absolute;
  right:6px;
  top:6px;
  background:none;
  border:none;
  color:#ffd700;
  cursor:pointer;
  font-size:14px;
}

</style>
</head>

<body>

<div class="main">

  <!-- CHESS -->
  <div class="board-wrapper">
    <div class="title">Magnus Carlsen vs Topalov</div>
    <div class="board" id="board"></div>
  </div>

  <!-- MESSAGE BOX -->
  <div class="container">
    <h2>Royal Message Box</h2>

    <textarea id="input" placeholder="Write your message..."></textarea>
    <button onclick="addComment()">Post Message</button>

    <div class="comments" id="comments"></div>
  </div>

</div>

<script>

/* ================= CHESS ================= */

const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState = [
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state=[...startState];
const board=document.getElementById("board");

const moves=[
[52,36],[11,27],[36,27],[3,27]
];

function draw(){
  board.innerHTML="";
  state.forEach((p,i)=>{
    const sq=document.createElement("div");
    const r=Math.floor(i/8),c=i%8;
    sq.className="square "+((r+c)%2?"black":"white");

    if(p){
      const im=document.createElement("img");
      im.className="piece";
      im.src=img[p];
      sq.appendChild(im);
    }
    board.appendChild(sq);
  });
}
draw();

/* ================= COORDS FIXED ================= */

function addCoords(){
  const wrapper=document.querySelector(".board-wrapper");
  const files=["A","B","C","D","E","F","G","H"];

  const size = 300/8; // 37.5px

  for(let i=0;i<8;i++){
    let f=document.createElement("div");
    f.className="coord file";
    f.style.left=(i*size+18)+"px";
    f.textContent=files[i];
    wrapper.appendChild(f);
  }

  for(let i=0;i<8;i++){
    let r=document.createElement("div");
    r.className="coord rank";
    r.style.top=(i*size+18)+"px";
    r.textContent=8-i;
    wrapper.appendChild(r);
  }
}
addCoords();

/* ================= COMMENTS ================= */

let comments = JSON.parse(localStorage.getItem("comments")) || [];

function render(){
  const box=document.getElementById("comments");
  box.innerHTML="";

  comments.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="comment";

    const text=document.createElement("div");
    text.textContent=c;

    const del=document.createElement("button");
    del.className="delete";
    del.innerHTML="🗑️";
    del.onclick=()=>{
      comments.splice(i,1);
      localStorage.setItem("comments",JSON.stringify(comments));
      render();
    };

    div.appendChild(text);
    div.appendChild(del);
    box.appendChild(div);
  });
}

function addComment(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  comments.push(text);
  localStorage.setItem("comments",JSON.stringify(comments));
  input.value="";
  input.style.height="50px";
  render();
}

/* auto resize textarea */
const input=document.getElementById("input");
input.addEventListener("input",()=>{
  input.style.height="auto";
  input.style.height=Math.min(input.scrollHeight,140)+"px";
});

render();

</script>

</body>
</html>
