<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050b1a;
  font-family:Arial;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid #020617;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* darker ocean theme */
.white{ background:#0ea5e9; }
.black{ background:#075985; }

/* squares */
.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

/* pieces */
.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  user-select:none;
  transition:0.3s;
}

/* coordinates */
.coord{
  position:absolute;
  font-size:12px;
  color:#cbd5e1;
  font-weight:bold;
}

.file{
  bottom:-18px;
}

.rank{
  left:-18px;
}
</style>
</head>

<body>

<div id="board" class="board"></div>

<script>

/* PIECE IMAGES */
const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",

  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

/* START POSITION */
const startState = [
  "r","n","b","q","k","b","n","r",
  "p","p","p","p","p","p","p","p",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "P","P","P","P","P","P","P","P",
  "R","N","B","Q","K","B","N","R"
];

let state = [...startState];

/* ♟️ VIENNA GAME MAIN VARIATION
1. e4 e5
2. Nc3 Nf6
3. f4 d5
4. fxe5 Nxe4
*/

const moves = [
  [52,36], // e4
  [12,28], // e5

  [57,42], // Nc3
  [6,21],  // Nf6

  [53,37], // f4
  [11,27], // d5

  [37,28], // fxe5
  [21,36]  // Nxe4
];

const board = document.getElementById("board");

/* DRAW BOARD */
function draw(){
  board.innerHTML = "";

  state.forEach((p,i)=>{
    const sq = document.createElement("div");

    const r = Math.floor(i/8);
    const c = i%8;

    sq.className = "square " + ((r+c)%2 ? "black" : "white");

    if(p){
      const im = document.createElement("img");
      im.className = "piece";
      im.src = img[p];
      sq.appendChild(im);
    }

    board.appendChild(sq);
  });

  addCoords();
}

/* COORDINATES */
function addCoords(){
  const files = ["A","B","C","D","E","F","G","H"];

  for(let i=0;i<8;i++){
    let f = document.createElement("div");
    f.className = "coord file";
    f.style.left = (i*52 + 18) + "px";
    f.textContent = files[i];
    board.appendChild(f);
  }

  for(let i=0;i<8;i++){
    let r = document.createElement("div");
    r.className = "coord rank";
    r.style.top = (i*52 + 18) + "px";
    r.textContent = 8 - i;
    board.appendChild(r);
  }
}

/* PLAY MOVES LOOP */
let moveIndex = 0;

function resetBoard(){
  state = [...startState];
  draw();
  moveIndex = 0;
}

function play(){

  if(moveIndex >= moves.length){

    setTimeout(()=>{
      resetBoard();
      play();
    },1500);

    return;
  }

  setTimeout(()=>{

    const [from,to] = moves[moveIndex];

    state[to] = state[from];
    state[from] = "";

    moveIndex++;

    draw();
    play();

  },700);
}

/* START */
draw();
play();

</script>

</body>
</html>
