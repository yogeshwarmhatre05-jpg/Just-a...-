<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lichess-Style Puzzle Engine</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2f3942;
font-family:Arial;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.board{
width:360px;
height:360px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.square{
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:30px;
user-select:none;
}

.light{background:#d7d4c0;}
.dark{background:#0f172a;color:white;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.status{
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="status" id="status">Loading engine...</div>

<button onclick="loadPuzzle()">New Puzzle</button>

<div class="board" id="board"></div>

</div>

<script>

let game;
let puzzleLine=[];
let index=0;
let selected=null;

const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");

const pieces={
p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",
P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔"
};

/* ---------------- DRAW ---------------- */
function draw(){
boardEl.innerHTML="";
let b=game.board();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let sq=document.createElement("div");
sq.className="square "+((r+c)%2?"dark":"light");

let p=b[r][c];
if(p){
let key=p.color==="w"?p.type.toUpperCase():p.type;
sq.innerText=pieces[key];
}

let square="abcdefgh"[c]+(8-r);
sq.onclick=()=>click(square);

boardEl.appendChild(sq);
}
}
}

/* ---------------- CLICK ---------------- */
function click(square){

if(!selected){
selected=square;
return;
}

let move=game.move({
from:selected,
to:square,
promotion:"q"
});

if(move){
handle(move.from+move.to);
}

selected=null;
draw();
}

/* ---------------- PUZZLE ENGINE ---------------- */
function handle(uci){

if(puzzleLine[index]===uci){
index++;

if(index>=puzzleLine.length){
statusEl.innerText="Solved!";
return;
}

/* opponent move */
setTimeout(()=>{
let m=puzzleLine[index];
game.move({from:m.slice(0,2),to:m.slice(2,4),promotion:"q"});
index++;
draw();
},300);

}else{
statusEl.innerText="Wrong move!";
}
}

/* ---------------- LOAD PUZZLE ---------------- */
async function loadPuzzle(){

statusEl.innerText="Loading puzzle...";

try{
let res=await fetch("https://lichess.org/api/puzzle/daily");
let data=await res.json();

game=new Chess(data.game.fen);

puzzleLine=data.puzzle.solution;
index=0;

draw();

statusEl.innerText="Solve the puzzle";

}catch(e){
console.log(e);
statusEl.innerText="Failed to load puzzle";
}
}

/* INIT */
game=new Chess();
draw();

loadPuzzle();

</script>

</body>
</html>
