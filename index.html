<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050b1a;
  font-family:Arial;
  overflow:hidden;
}

.main{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* ================= CHESS ================= */

.board-wrapper{
  position:relative;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid #020617;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border-radius:10px;
}

/* BACK TO ORIGINAL SOFT THEME */
.white{
  background:linear-gradient(145deg,#e8eef5,#cfd8e3);
}

.black{
  background:linear-gradient(145deg,#4b6584,#2f4858);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  user-select:none;
  pointer-events:none;
}

.title{
  position:absolute;
  top:-45px;
  left:0;
  color:white;
  font-size:14px;
  font-weight:bold;
}

/* ================= MESSAGE BOX ================= */

.container{
  width:420px;
  background:rgba(0,0,0,0.35);
  border:2px solid #3b82f6;
  border-radius:14px;
  padding:12px;
  box-shadow:0 0 20px rgba(59,130,246,0.25);
}

/* FIX INPUT INSIDE BOX */
textarea{
  width:100%;
  box-sizing:border-box;
  height:70px;
  border-radius:10px;
  border:1px solid #3b82f6;
  padding:10px;
  resize:none;
  outline:none;
  background:#0b1220;
  color:#fff;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* ================= HORIZONTAL MESSAGES ================= */

.comments-frame{
  margin-top:12px;
  display:flex;
  flex-wrap:wrap;        /* horizontal layout */
  gap:8px;
  max-height:160px;
  overflow-y:auto;
  padding:5px;
  border-top:1px solid #3b82f6;
}

/* each message becomes a small pill */
.comment{
  background:rgba(59,130,246,0.15);
  border:1px solid rgba(59,130,246,0.4);
  padding:8px 10px;
  border-radius:10px;
  color:#fff;
  font-size:13px;
  white-space:nowrap;   /* horizontal text */
}

</style>
</head>

<body>

<div class="main">

  <!-- ================= CHESS ================= -->
  <div class="board-wrapper">
    <div class="title">Magnus Carlsen vs Veselin Topalov (2010)</div>
    <div class="board" id="board"></div>
  </div>

  <!-- ================= COMMENTS ================= -->
  <div class="container">

    <textarea id="input" placeholder="Write message..."></textarea>
    <button onclick="addComment()">Post</button>

    <div class="comments-frame" id="comments"></div>

  </div>

</div>

<script>

/* ================= CHESS ================= */

const img={
P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state=[...startState];
const board=document.getElementById("board");

function draw(){
board.innerHTML="";
state.forEach((p,i)=>{
const sq=document.createElement("div");
const r=Math.floor(i/8),c=i%8;
sq.className="square "+((r+c)%2?"black":"white");

if(p){
const im=document.createElement("img");
im.className="piece";
im.src=img[p];
sq.appendChild(im);
}

board.appendChild(sq);
});
}

draw();

/* ================= COMMENTS ================= */

let comments=JSON.parse(localStorage.getItem("comments"))||[];

function render(){
const box=document.getElementById("comments");
box.innerHTML="";

comments.forEach(c=>{
const div=document.createElement("div");
div.className="comment";
div.textContent=c;
box.appendChild(div);
});
}

function addComment(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text)return;

comments.push(text);
localStorage.setItem("comments",JSON.stringify(comments));
input.value="";
render();
}

render();

</script>

</body>
</html>
