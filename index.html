<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #7a0000, #120000);
  font-family: Arial;
  overflow:hidden;
}

/* MAIN LAYOUT */
.main{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* ================= CHESS ================= */

.board-wrapper{
  position:relative;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:8px solid #d4af37;
  border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* softer premium chess theme */
.white{
  background: linear-gradient(145deg,#f1f6ff,#cfd8e3);
}

.black{
  background: linear-gradient(145deg,#3a5a78,#1f2f3d);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  user-select:none;
  pointer-events:none;
}

.title{
  position:absolute;
  top:-45px;
  left:0;
  color:#ffd700;
  font-size:14px;
  font-weight:bold;
}

/* ================= COMMENT BOX ================= */

.container{
  width:420px;
  background: rgba(0,0,0,0.45);
  border: 2px solid #ffd700;
  border-radius: 14px;
  padding: 12px;
  box-shadow: 0 0 25px rgba(255,215,0,0.25);
}

/* input */
textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  border:1px solid #ffd700;
  padding:10px;
  resize:none;
  outline:none;
  background:#1a0000;
  color:#fff;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffd700;
  color:#2b0000;
  font-weight:bold;
  cursor:pointer;
}

/* ================= SCROLL FRAME ================= */

.comments-frame{
  margin-top:12px;
  height:180px;              /* fixed frame */
  overflow-y:auto;           /* ONLY THIS SCROLLS */
  padding-right:5px;
  border-top:1px solid #ffd700;
}

/* custom scroll look */
.comments-frame::-webkit-scrollbar{
  width:6px;
}
.comments-frame::-webkit-scrollbar-thumb{
  background:#ffd700;
  border-radius:10px;
}

/* MESSAGE CARD */
.comment{
  background: linear-gradient(145deg, rgba(255,215,0,0.12), rgba(255,255,255,0.06));
  border-left:3px solid #ffd700;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  color:#fff;
  font-size:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* text */
.comment span{
  flex:1;
  padding-right:10px;
  word-break:break-word;
}

/* delete button */
.del{
  background:#ff3b3b;
  border:none;
  color:white;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.del:hover{
  background:#ff1f1f;
}
</style>
</head>

<body>

<div class="main">

  <!-- ================= CHESS ================= -->
  <div class="board-wrapper">

    <div class="title">Magnus Carlsen vs Veselin Topalov (2010)</div>
    <div class="board" id="board"></div>

  </div>

  <!-- ================= COMMENTS ================= -->
  <div class="container">

    <textarea id="input" placeholder="Write your message..."></textarea>
    <button onclick="addComment()">Post Message</button>

    <div class="comments-frame" id="comments"></div>

  </div>

</div>

<script>

/* ================= CHESS (UNCHANGED LOGIC) ================= */

const img = {
P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state=[...startState];
const board=document.getElementById("board");

const moves=[
[52,36],[11,27],[36,27],[3,27],
[57,42],[27,24],[51,35],[6,21],
[62,45],[10,18],[61,34],[2,29],
[34,43],[12,20],[59,52],[29,38],
castleWhite(),[1,18],[43,34],
castleBlack()
];

function castleWhite(){return["castleWhite"];}
function castleBlack(){return["castleBlack"];}

function draw(){
board.innerHTML="";
state.forEach((p,i)=>{
const sq=document.createElement("div");
const r=Math.floor(i/8),c=i%8;
sq.className="square "+((r+c)%2?"black":"white");

if(p){
const im=document.createElement("img");
im.className="piece";
im.src=img[p];
sq.appendChild(im);
}

board.appendChild(sq);
});
}

let moveIndex=0;

function resetBoard(){
state=[...startState];
moveIndex=0;
draw();
}

function play(){
if(moveIndex>=moves.length){
setTimeout(()=>{resetBoard();play();},2000);
return;
}

setTimeout(()=>{
const move=moves[moveIndex];

if(move[0]==="castleWhite"){
state[62]=state[60]; state[60]="";
state[61]=state[63]; state[63]="";
}
else if(move[0]==="castleBlack"){
state[6]=state[4]; state[4]="";
state[5]=state[7]; state[7]="";
}
else{
const [f,t]=move;
state[t]=state[f];
state[f]="";
}

draw();
moveIndex++;
play();
},650);
}

draw();
play();

/* ================= COMMENTS ================= */

let comments=JSON.parse(localStorage.getItem("comments"))||[];

function render(){
const box=document.getElementById("comments");
box.innerHTML="";

comments.forEach((c,i)=>{
const div=document.createElement("div");
div.className="comment";

div.innerHTML=`
<span>${c}</span>
<button class="del" onclick="del(${i})">Delete</button>
`;

box.appendChild(div);
});
}

function addComment(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text)return;

comments.unshift(text);
localStorage.setItem("comments",JSON.stringify(comments));
input.value="";
render();
}

function del(i){
comments.splice(i,1);
localStorage.setItem("comments",JSON.stringify(comments));
render();
}

render();

</script>

</body>
</html>
