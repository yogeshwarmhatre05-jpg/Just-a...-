<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Club Members</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
  linear-gradient(rgba(3,8,20,.88),rgba(3,8,20,.96)),
  url('https://images.unsplash.com/photo-1528819622765-d6bcf132f793?q=80&w=1200&auto=format&fit=crop') center/cover;
  font-family:Georgia,serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.club-box{
  width:350px;
  background:#0f1d33;
  border:1px solid rgba(120,170,255,.2);
  padding:25px;
  position:relative;
  overflow:hidden;
  box-shadow:
  0 0 25px rgba(0,0,0,.5),
  inset 0 0 20px rgba(255,255,255,.03);
}

.club-box::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:3px;
  background:linear-gradient(90deg,#3b82f6,#ff944d,#3b82f6);
}

.heading{
  color:#a9bdd9;
  letter-spacing:5px;
  font-size:15px;
  margin-bottom:25px;
  border-bottom:1px solid rgba(255,255,255,.08);
  padding-bottom:12px;
}

.big-count{
  text-align:center;
  margin-bottom:35px;
}

.big-count h1{
  font-size:72px;
  color:#ef944c;
  text-shadow:0 0 15px rgba(239,148,76,.25);
}

.big-count p{
  color:#8da3bf;
  font-style:italic;
  font-size:18px;
}

.timeline{
  position:relative;
  padding-left:65px;
}

.line{
  position:absolute;
  left:22px;
  top:0;
  width:4px;
  height:100%;
  background:#21395b;
}

.member-row{
  position:relative;
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:34px;
}

.dot{
  position:absolute;
  left:-54px;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ef944c;
  border:4px solid #ef944c;
}

.dot.active{
  width:28px;
  height:28px;
  left:-58px;
  border:4px solid #f7c18f;
}

.dot.inactive{
  background:#132540;
  border-color:#28466e;
}

.member-label{
  width:90px;
  color:#e4c29b;
  font-size:24px;
  font-weight:bold;
}

.member-label.inactive{
  color:#334a67;
}

.progress{
  flex:1;
  height:12px;
  background:#203453;
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#f5a657,#ea8337);
  border-radius:20px;
  transition:1s;
}

.status{
  width:50px;
  text-align:right;
  color:#ef944c;
}

.status.inactive{
  color:#41597a;
}

.footer{
  margin-top:25px;
  text-align:center;
  color:#9db0ca;
  letter-spacing:5px;
  border-top:1px solid rgba(255,255,255,.06);
  padding-top:18px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="club-box">

  <div class="heading">
    👥 MEMBER COUNT
  </div>

  <div class="big-count">
    <h1 id="memberCount">0</h1>
    <p>members</p>
  </div>

  <div class="timeline">
    <div class="line"></div>

    <div id="levels"></div>
  </div>

  <div class="footer">
    KEEP THE ETERNAL SPIRIT ALIVE
  </div>

</div>

<script>

/*
PUT YOUR CHESS CLUB NAME HERE
*/

const clubName = "PixelGlow";

/*
CHESS.COM API
*/

const apiUrl =
`https://api.chess.com/pub/club/${clubName}`;

const levels = [
  0,
  100,
  500,
  1000,
  2000,
  5000,
  10000,
  50000
];

const memberCountText =
document.getElementById("memberCount");

const levelContainer =
document.getElementById("levels");

/*
ANIMATE NUMBER
*/

function animateNumber(start,end){

  let current = start;

  const speed =
  Math.ceil(end / 50);

  const timer = setInterval(()=>{

    current += speed;

    if(current >= end){
      current = end;
      clearInterval(timer);
    }

    memberCountText.textContent =
    current.toLocaleString();

  },20);
}

/*
RENDER LEVELS
*/

function renderLevels(memberCount){

  levelContainer.innerHTML = "";

  levels.forEach(level=>{

    const row =
    document.createElement("div");

    row.className = "member-row";

    const dot =
    document.createElement("div");

    dot.className = "dot";

    const label =
    document.createElement("div");

    label.className = "member-label";

    label.textContent =
    level.toLocaleString();

    const progress =
    document.createElement("div");

    progress.className = "progress";

    const fill =
    document.createElement("div");

    fill.className = "progress-fill";

    const status =
    document.createElement("div");

    status.className = "status";

    let percent = 0;

    if(memberCount >= level){

      percent = 100;

      status.textContent = "✓";
    }

    else if(memberCount > level - 100){

      percent =
      memberCount - (level - 100);

      dot.classList.add("active");

      status.textContent =
      percent + "%";
    }

    else{

      percent = 0;

      dot.classList.add("inactive");

      label.classList.add("inactive");

      status.classList.add("inactive");
    }

    fill.style.width =
    percent + "%";

    progress.appendChild(fill);

    row.appendChild(dot);
    row.appendChild(label);
    row.appendChild(progress);
    row.appendChild(status);

    levelContainer.appendChild(row);

  });

}

/*
LOAD CHESS CLUB MEMBERS
*/

async function loadMembers(){

  try{

    const response =
    await fetch(apiUrl);

    const data =
    await response.json();

    /*
    AUTO MEMBER COUNT
    */

    const memberCount =
    data.members;

    animateNumber(0,memberCount);

    renderLevels(memberCount);

  }

  catch(error){

    memberCountText.textContent =
    "Error";

    console.log(error);
  }

}

loadMembers();

/*
AUTO REFRESH EVERY 60 SECONDS
*/

setInterval(loadMembers,60000);

</script>

</body>
</html>
