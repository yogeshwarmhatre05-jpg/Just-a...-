<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  body{
    background:#0F172A;
    margin:0;
    border:2px solid #1E293B;
    min-height:100vh;
    box-sizing:border-box;
    border-radius:2px;
    color:#E2E8F0;
    transition:background 1s ease,border-color 1s ease;
  }

  .mainBox{
    max-width:300px;
    margin:auto;
    padding:14px;
    border-radius:2px;
    background:#0F172A;
    text-align:center;
    color:#E2E8F0;
    border:2px solid #1E293B;
    transition:background 1s ease,border-color 1s ease,box-shadow 1s ease;
  }

  .themeText{
    transition:color 1s ease,text-shadow 1s ease;
  }

  .line{
    height:1px;
    background:rgba(226,232,240,0.2);
    margin:8px 20px;
  }

  @keyframes discoRGB{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
</style>
</head>

<body>

<div class="mainBox" id="mainBox">

  <p style="margin:0;">
    <iframe width="270" height="60"
      style="border:0;display:block;margin:0;padding:0;border-radius:2px;"

    </iframe>
  </p>

  <div class="themeText" id="welcomeText"
    style="font-size:15px;letter-spacing:2px;color:#22C55E;overflow:hidden;">
    <marquee behavior="scroll" direction="left" scrollamount="3">
      ♣Welcome to Our Club♣
    </marquee>
  </div>

  <br>

  <div style="font-size:11px;letter-spacing:3px;">
    <span class="themeText" id="ownerText"
      style="font-size:14px;color:#22C55E;">
      ✧ 𝐎 𝐖 𝐍 𝐄 𝐑 ✧
    </span>
  </div>

  <div style="font-size:22px;font-weight:900;margin-top:6px;">
    <img src="https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/yogi136/php8h3mmr9lb0qd8ZyClyS.png"
      style="display:block;margin:0 auto;border-radius:2px;"
      width="100"
      height="100">
  </div>

  <div id="yogiText"
    class="themeText"
    style="
      font-size:22px;
      font-weight:900;
      margin-top:6px;
      font-family:cursive;
      color:#22C55E;
    ">
    √𝓎𝓸𝓰𝓲136
  </div>

  <div class="line"></div>

  <div style="font-size:12px;font-style:italic;">
    “Think like a King. Play like a Master.”
  </div>

  <br>

  <!-- PLAYER -->
  <div style="display:flex;justify-content:center;">
    <iframe
      id="musicPlayer"
      width="280"
      height="215"
      style="border:none;border-radius:2px;"
      src="https://yogeshwarmhatre05-jpg.github.io/Player/">
    </iframe>
  </div>

  <br>

  <iframe
    src="https://yogeshwarmhatre05-jpg.github.io/Flappy-game/"
    width="250"
    height="250"
    style="border:none;border-radius:2px;"
    scrolling="no">
  </iframe>
</div>

<br>

<div style="display:flex;justify-content:center;">
  <iframe width="255" height="255"
    style="border:none;border-radius:2px;"
    src="https://yogeshwarmhatre05-jpg.github.io/Calend-orig/">
  </iframe>
</div>

<br>

<div style="
  display:flex;
  justify-content:center;
  padding:10px;
  background:#0F172A;
">
  <iframe
    src="https://yogeshwarmhatre05-jpg.github.io/Official-last-part/"
    width="300"
    height="200"
    style="
      border:2px solid #1E293B;
      border-radius:12px;
      overflow:hidden;
      background:#0F172A;
    ">
  </iframe>
</div>

<br>

<div style="text-align:center;margin-bottom:20px;">

  <div style="
    font-size:22px;
    font-weight:900;
    margin-top:6px;
    font-family:cursive;
    background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:discoRGB 6s ease-in-out infinite;
    display:inline-block;
  ">
    Made by yogi136
  </div>

</div>

<script>
/*
  FAKE MUSIC REACTIVE THEME
  Changes colors automatically like song moods
*/

const themes = [
  {
    bg:"#0F172A",
    border:"#22C55E",
    glow:"rgba(34,197,94,0.5)",
    text:"#22C55E"
  },

  {
    bg:"#1E1B4B",
    border:"#A855F7",
    glow:"rgba(168,85,247,0.5)",
    text:"#A855F7"
  },

  {
    bg:"#111827",
    border:"#3B82F6",
    glow:"rgba(59,130,246,0.5)",
    text:"#3B82F6"
  },

  {
    bg:"#2A0F0F",
    border:"#FF4D4D",
    glow:"rgba(255,77,77,0.5)",
    text:"#FF4D4D"
  },

  {
    bg:"#1A1A00",
    border:"#FFCC00",
    glow:"rgba(255,204,0,0.5)",
    text:"#FFCC00"
  }
];

let index = 0;

function changeTheme(){

  const theme = themes[index];

  document.body.style.background = theme.bg;
  document.body.style.borderColor = theme.border;

  const box = document.getElementById("mainBox");
  box.style.background = theme.bg;
  box.style.borderColor = theme.border;
  box.style.boxShadow = `0 0 25px ${theme.glow}`;

  document.querySelectorAll(".themeText").forEach(el=>{
    el.style.color = theme.text;
    el.style.textShadow = `0 0 12px ${theme.glow}`;
  });

  index++;
  if(index >= themes.length){
    index = 0;
  }
}

/*
  Change every 6 seconds
  Feels synced with music
*/

setInterval(changeTheme, 6000);

changeTheme();
</script>

</body>
</html>
