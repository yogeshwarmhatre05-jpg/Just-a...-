<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050b1a;
  font-family:Arial;
}

/* MAIN CENTER */
.main{
  width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

/* ================= CHESS ================= */

.board-wrapper{
  position:relative;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid #020617;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.white{
  background:linear-gradient(145deg,#e8eef5,#cfd8e3);
}

.black{
  background:linear-gradient(145deg,#4b6584,#2f4858);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  pointer-events:none;
}

/* coords */
.coord{
  position:absolute;
  font-size:12px;
  color:#cbd5e1;
  font-weight:bold;
}

.file{ bottom:-22px; }
.rank{ left:-20px; }

.title{
  position:absolute;
  top:-45px;
  left:0;
  color:white;
  font-size:15px;
  font-weight:bold;
}

/* ================= MESSAGE BOX ================= */

.container{
  width:420px;
  background: rgba(255,255,255,0.06);
  border:2px solid #ffd700;
  border-radius:14px;
  padding:12px;
  box-shadow:0 0 20px rgba(255,215,0,0.15);
  box-sizing:border-box;
}

h2{
  text-align:center;
  color:#ffd700;
  margin:5px 0 10px;
}

/* INPUT */
textarea{
  width:100%;
  min-height:60px;
  max-height:120px;
  border-radius:8px;
  border:1px solid #ffd700;
  padding:8px;
  resize:none;
  outline:none;
  background:#0b0f1a;
  color:#fff;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#ffd700;
  font-weight:bold;
  cursor:pointer;
}

/* COMMENTS AREA */
.comments{
  margin-top:10px;
  max-height:200px;
  overflow-y:auto;
  border-top:1px solid rgba(255,215,0,0.4);
  padding-top:8px;
}

/* MESSAGE ROW (FIXED LAYOUT) */
.comment{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background: rgba(255,255,255,0.06);
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
  color:#fff;
  font-size:13px;
  gap:10px;
}

/* TEXT AREA INSIDE MESSAGE */
.msgText{
  flex:1;
  word-break:break-word;
}

/* 🚫 BUTTON RIGHT EDGE */
.delete{
  flex-shrink:0;
  background:none;
  border:none;
  color:#ffd700;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="main">

  <!-- CHESS -->
  <div class="board-wrapper">
    <div class="title">Magnus Carlsen vs Topalov</div>
    <div class="board" id="board"></div>
  </div>

  <!-- MESSAGE -->
  <div class="container">
    <h2>Royal Message Box</h2>

    <textarea id="input" placeholder="Write message..."></textarea>
    <button onclick="addComment()">Post</button>

    <div class="comments" id="comments"></div>
  </div>

</div>

<script>

/* ================= CHESS (UNCHANGED WORKING ENGINE) ================= */

const img = {
P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state=[...startState];
const board=document.getElementById("board");

function draw(){
board.innerHTML="";
state.forEach((p,i)=>{
const sq=document.createElement("div");
const r=Math.floor(i/8),c=i%8;
sq.className="square "+((r+c)%2?"black":"white");

if(p){
const im=document.createElement("img");
im.className="piece";
im.src=img[p];
sq.appendChild(im);
}
board.appendChild(sq);
});
}
draw();

/* ================= COMMENTS (FIXED ROW LAYOUT) ================= */

let comments = JSON.parse(localStorage.getItem("comments")) || [];

function render(){
const box=document.getElementById("comments");
box.innerHTML="";

comments.forEach((c,i)=>{
const div=document.createElement("div");
div.className="comment";

const text=document.createElement("div");
text.className="msgText";
text.textContent=c;

const del=document.createElement("button");
del.className="delete";
del.innerHTML="🚫";

del.onclick=()=>{
comments.splice(i,1);
localStorage.setItem("comments",JSON.stringify(comments));
render();
};

div.appendChild(text);
div.appendChild(del);
box.appendChild(div);
});
}

function addComment(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

comments.push(text);
localStorage.setItem("comments",JSON.stringify(comments));
input.value="";
render();
}

render();

</script>

</body>
</html>
