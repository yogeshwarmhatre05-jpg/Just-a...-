<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
:root{
  --light:#dff4ff;
  --dark:#3b82a6;
  --border:#08131f;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

.board-wrapper{
  position:relative;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid var(--border);
  box-shadow:0 20px 50px rgba(0,0,0,0.55);
  position:relative;
}

/* squares */
.square{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  transition:all 0.25s ease;
  position:relative;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

/* pieces */
.piece{
  font-size:36px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  transition:transform 0.25s ease;
}

/* coordinates */
.coord{
  position:absolute;
  font-size:10px;
  font-weight:bold;
  opacity:0.8;
  pointer-events:none;
}

.file{
  right:4px;
  bottom:2px;
}

.rank{
  left:4px;
  top:2px;
}

.white .coord{
  color:#25637f;
}

.black .coord{
  color:#dff4ff;
}
</style>
</head>

<body>

<div class="board-wrapper">
  <div id="board" class="board"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script>
/* =========================================
   SICILIAN DEFENSE — NAJDORF VARIATION
   ========================================= */

const PGN = `
1. e4 c5
2. Nf3 d6
3. d4 cxd4
4. Nxd4 Nf6
5. Nc3 a6
6. Bg5 e6
7. f4 Be7
8. Qf3 Qc7
9. O-O-O Nbd7
10. g4 b5
11. Bxf6 Nxf6
12. g5 Nd7
13. f5 Ne5
14. Qg3 b4
15. Nce2 Bb7
16. Bg2 Rc8
17. Kb1 O-O
`;

const pieces = {
  p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚",
  P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔"
};

const files = ["a","b","c","d","e","f","g","h"];

const boardEl = document.getElementById("board");

let game = new Chess();
let moves = [];
let index = 0;

/* DRAW BOARD */
function draw(){

  const fen = game.fen().split(" ")[0];
  boardEl.innerHTML = "";

  let r = 0;

  for(let row of fen.split("/")){

    let c = 0;

    for(let ch of row){

      if(!isNaN(ch)){

        for(let i=0;i<+ch;i++){
          createSquare("", r, c++);
        }

      } else {

        createSquare(ch, r, c++);

      }
    }

    r++;
  }
}

/* CREATE SQUARE */
function createSquare(piece,r,c){

  let sq = document.createElement("div");

  sq.className =
    "square " + ((r+c)%2 ? "black" : "white");

  /* piece */
  let p = document.createElement("div");
  p.className = "piece";
  p.textContent = pieces[piece] || "";

  sq.appendChild(p);

  /* coordinates */

  // files on bottom row
  if(r === 7){

    let file = document.createElement("div");
    file.className = "coord file";
    file.textContent = files[c];

    sq.appendChild(file);
  }

  // ranks on left column
  if(c === 0){

    let rank = document.createElement("div");
    rank.className = "coord rank";
    rank.textContent = 8 - r;

    sq.appendChild(rank);
  }

  boardEl.appendChild(sq);
}

/* PLAY MOVES */
function play(){

  if(index < moves.length){

    setTimeout(()=>{

      game.move(moves[index]);

      index++;

      draw();

      play();

    },650);

  }
}

/* START */
function start(){

  game = new Chess();

  game.load_pgn(PGN);

  moves = game.history();

  index = 0;

  game.reset();

  draw();

  play();
}

start();
</script>

</body>
</html>
