<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid #0f172a;
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  user-select:none;
}

.white{ background:#e6f6ff; }
.black{ background:#6ec1e4; }

.piece{
  font-size:34px;
}
</style>
</head>

<body>

<div id="board" class="board"></div>

<script>
/* ♟️ PIECES */
const pieces = {
  p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚",
  P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔"
};

/* ♟️ START POSITION */
let boardState = [
  "r","n","b","q","k","b","n","r",
  "p","p","p","p","p","p","p","p",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "P","P","P","P","P","P","P","P",
  "R","N","B","Q","K","B","N","R"
];

/* ♟️ VIENNA GAMBIT MAIN VARIATION */
const MOVES = [

  // 1. e4
  [52,36],

  // ... e5
  [12,28],

  // 2. Nc3
  [57,42],

  // ... Nf6
  [6,21],

  // 3. f4
  [53,37],

  // ... d5
  [11,27],

  // 4. fxe5
  [37,28],

  // ... Nxe4
  [21,36],

  // 5. Nf3
  [62,45],

  // ... Be7
  [5,12],

  // 6. d4
  [51,35],

  // ... O-O
  [4,6],
  [7,5],

  // 7. Bd3
  [61,43],

  // ... f5
  [13,29],

  // 8. exf6
  [28,21],

  // ... Bxf6
  [12,21],

  // 9. O-O
  [60,62],
  [63,61],

  // ... Nc6
  [1,18]
];

const board = document.getElementById("board");

/* DRAW BOARD */
function draw(){
  board.innerHTML = "";

  boardState.forEach((p,i)=>{
    const sq = document.createElement("div");

    const r = Math.floor(i/8);
    const c = i%8;

    sq.className = "square " + ((r+c)%2 ? "black" : "white");

    sq.textContent = pieces[p] || "";

    board.appendChild(sq);
  });
}

/* PLAY MOVES */
let index = 0;

function play(){
  if(index >= MOVES.length) return;

  setTimeout(()=>{

    const [from,to] = MOVES[index];

    boardState[to] = boardState[from];
    boardState[from] = "";

    index++;

    draw();
    play();

  }, 650);
}

/* START */
draw();
play();
</script>

</body>
</html>
