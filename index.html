<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sicilian Najdorf Chess Animation</title>

<style>

:root{
  --light:#dff4ff;
  --dark:#3b82a6;
  --border:#08131f;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  font-family:Arial,sans-serif;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid var(--border);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* squares */
.square{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:36px;
}

.white{
  background:var(--light);
}

.black{
  background:var(--dark);
}

/* coordinates */
.coord{
  position:absolute;
  font-size:10px;
  font-weight:bold;
  opacity:0.8;
}

.file{
  right:3px;
  bottom:2px;
}

.rank{
  left:3px;
  top:2px;
}

.white .coord{
  color:#25637f;
}

.black .coord{
  color:#eaf9ff;
}

.piece{
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

</style>
</head>

<body>

<div id="board" class="board"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>

/* SICILIAN DEFENSE — NAJDORF */

const PGN = `
1. e4 c5
2. Nf3 d6
3. d4 cxd4
4. Nxd4 Nf6
5. Nc3 a6
6. Bg5 e6
7. f4 Be7
8. Qf3 Qc7
9. O-O-O Nbd7
10. g4 b5
11. Bxf6 Nxf6
12. g5 Nd7
13. f5 Ne5
14. Qg3 b4
15. Nce2 Bb7
16. Bg2 Rc8
17. Kb1 O-O
`;

const pieces = {
  p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚",
  P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔"
};

const files = ["a","b","c","d","e","f","g","h"];

const board = document.getElementById("board");

let game = new Chess();

game.load_pgn(PGN);

const moves = game.history();

game.reset();

let moveIndex = 0;

/* DRAW BOARD */

function drawBoard(){

  board.innerHTML = "";

  const position = game.board();

  for(let r=0;r<8;r++){

    for(let c=0;c<8;c++){

      const square = document.createElement("div");

      square.className =
        "square " + ((r+c)%2 ? "black" : "white");

      /* piece */
      const pieceDiv = document.createElement("div");

      pieceDiv.className = "piece";

      const piece = position[r][c];

      if(piece){

        const code =
          piece.color === "w"
          ? piece.type.toUpperCase()
          : piece.type;

        pieceDiv.textContent = pieces[code];
      }

      square.appendChild(pieceDiv);

      /* coordinates */

      if(r === 7){

        const file = document.createElement("div");

        file.className = "coord file";

        file.textContent = files[c];

        square.appendChild(file);
      }

      if(c === 0){

        const rank = document.createElement("div");

        rank.className = "coord rank";

        rank.textContent = 8-r;

        square.appendChild(rank);
      }

      board.appendChild(square);
    }
  }
}

/* PLAY MOVES */

function animateGame(){

  if(moveIndex >= moves.length) return;

  setTimeout(()=>{

    game.move(moves[moveIndex]);

    moveIndex++;

    drawBoard();

    animateGame();

  },650);
}

/* START */

drawBoard();

animateGame();

</script>

</body>
</html>
