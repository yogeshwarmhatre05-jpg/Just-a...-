<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #8b0000, #1a0000);
  font-family:Arial;
}

/* MAIN */
.main{
  width:300px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

/* ================= CHESS ================= */

.board-wrapper{ position:relative; }

.board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:6px solid #ffd700;
  border-radius:10px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.white{ background:linear-gradient(145deg,#e8eef5,#cfd8e3); }
.black{ background:linear-gradient(145deg,#4b6584,#2f4858); }

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  pointer-events:none;
}

/* coords */
.coord{
  position:absolute;
  font-size:10px;
  color:#ffd700;
  font-weight:bold;
}

.file{ bottom:-18px; }
.rank{ left:-16px; }

.title{
  position:absolute;
  top:-35px;
  left:0;
  color:#ffd700;
  font-size:12px;
  font-weight:bold;
}

/* ================= PGN INPUT ================= */

.pgnBox{
  width:300px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.pgnInput{
  width:100%;
  height:60px;
  resize:none;
  border-radius:8px;
  border:1px solid #ffd700;
  background:#1a0000;
  color:#fff;
  padding:6px;
  outline:none;
}

.pgnBtn{
  padding:6px;
  border:none;
  border-radius:8px;
  background:#ffd700;
  font-weight:bold;
  cursor:pointer;
}

/* ================= MESSAGE BOX ================= */

.container{
  width:300px;
  height:220px;        /* FIXED FRAME */
  display:flex;
  flex-direction:column;
  background: rgba(0,0,0,0.35);
  border:2px solid #ffd700;
  border-radius:12px;
  padding:10px;
}

h2{
  text-align:center;
  color:#ffd700;
  margin:4px 0;
  font-size:15px;
}

textarea{
  width:100%;
  min-height:50px;
  max-height:90px;
  border-radius:8px;
  border:1px solid #ffd700;
  padding:6px;
  resize:none;
  outline:none;
  background:#1a0000;
  color:#fff;
}

button{
  width:100%;
  margin-top:6px;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#ffd700;
  font-weight:bold;
  cursor:pointer;
}

/* COMMENTS FIXED AREA */
.comments{
  margin-top:8px;
  flex:1;
  overflow-y:auto;
  border-top:1px solid #ffd700;
  padding-top:6px;
}

/* MESSAGE */
.comment{
  position:relative;
  background:rgba(255,255,255,0.08);
  padding:8px 30px 8px 8px;
  border-radius:8px;
  margin-bottom:6px;
  color:#fff;
  font-size:13px;
  word-wrap:break-word;
}

/* 🚫 DELETE ICON (RIGHT CORNER CLEAN) */
.delete{
  position:absolute;
  right:6px;
  top:6px;
  border:none;
  background:transparent;
  color:#ffd700;
  font-size:16px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="main">

  <!-- CHESS -->
  <div class="board-wrapper">
    <div class="title">Chess Board</div>
    <div class="board" id="board"></div>
  </div>

  <!-- PGN INPUT -->
  <div class="pgnBox">
    <textarea id="pgn" placeholder="Paste PGN moves here..."></textarea>
    <button class="pgnBtn" onclick="loadPGN()">Load PGN</button>
  </div>

  <!-- MESSAGE BOX -->
  <div class="container">
    <h2>Message Box</h2>

    <textarea id="input" placeholder="Write message..."></textarea>
    <button onclick="addComment()">Post</button>

    <div class="comments" id="comments"></div>
  </div>

</div>

<script>

/* ================= CHESS ================= */

const img={
P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

let state=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

const board=document.getElementById("board");

function draw(){
board.innerHTML="";
state.forEach((p,i)=>{
  const sq=document.createElement("div");
  const r=Math.floor(i/8),c=i%8;
  sq.className="square "+((r+c)%2?"black":"white");

  if(p){
    const im=document.createElement("img");
    im.className="piece";
    im.src=img[p];
    sq.appendChild(im);
  }
  board.appendChild(sq);
});
}
draw();

/* ================= PGN LOADER ================= */

function loadPGN(){
  let text=document.getElementById("pgn").value;
  alert("PGN loaded (demo mode)\n\nYou can later connect full chess engine here.");
}

/* ================= COORDS ================= */

function addCoords(){
const wrapper=document.querySelector(".board-wrapper");
const files=["A","B","C","D","E","F","G","H"];
const size=300/8;

for(let i=0;i<8;i++){
  let f=document.createElement("div");
  f.className="coord file";
  f.style.left=(i*size+18)+"px";
  f.textContent=files[i];
  wrapper.appendChild(f);
}

for(let i=0;i<8;i++){
  let r=document.createElement("div");
  r.className="coord rank";
  r.style.top=(i*size+18)+"px";
  r.textContent=8-i;
  wrapper.appendChild(r);
}
}
addCoords();

/* ================= COMMENTS ================= */

let comments=JSON.parse(localStorage.getItem("comments"))||[];

function render(){
const box=document.getElementById("comments");
box.innerHTML="";

comments.forEach((c,i)=>{
  const div=document.createElement("div");
  div.className="comment";

  const text=document.createElement("div");
  text.textContent=c;

  const del=document.createElement("button");
  del.className="delete";
  del.innerHTML="🚫";
  del.onclick=()=>{
    comments.splice(i,1);
    localStorage.setItem("comments",JSON.stringify(comments));
    render();
  };

  div.appendChild(text);
  div.appendChild(del);
  box.appendChild(div);
});
}

function addComment(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

comments.push(text);
localStorage.setItem("comments",JSON.stringify(comments));
input.value="";
render();
}

/* auto resize */
const input=document.getElementById("input");
input.addEventListener("input",()=>{
input.style.height="auto";
input.style.height=Math.min(input.scrollHeight,90)+"px";
});

render();

</script>

</body>
</html>
