<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0b0f1a, #000000);
  font-family:Arial;
}

/* MAIN WRAPPER (FIXED CENTER ALIGNMENT) */
.main{
  width:300px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px; /* proper spacing between chess & message */
}

/* ================= CHESS ================= */

.board-wrapper{
  position:relative;
}

.board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:3px solid #ffd700;
  border-radius:12px;
  box-shadow:
    0 0 15px rgba(255,215,0,0.25),
    0 0 30px rgba(0,180,255,0.15);
  overflow:hidden;
}

.white{
  background: linear-gradient(145deg,#e6f0ff,#cfd9e6);
}

.black{
  background: linear-gradient(145deg,#1b2a3a,#0f1722);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  user-select:none;
  pointer-events:none;
}

/* coords */
.coord{
  position:absolute;
  font-size:10px;
  color:#ffd700;
  font-weight:bold;
  opacity:0.9;
}

.file{ bottom:-18px; }
.rank{ left:-16px; }

.title{
  position:absolute;
  top:-32px;
  left:0;
  color:#00d4ff;
  font-size:12px;
  font-weight:bold;
  text-shadow:0 0 8px rgba(0,212,255,0.6);
}

/* ================= MESSAGE BOX ================= */

.container{
  width:300px;
  background: rgba(255,255,255,0.06);
  border:2px solid rgba(255,215,0,0.8);
  border-radius:14px;
  padding:10px;
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 18px rgba(255,215,0,0.2),
    inset 0 0 10px rgba(0,0,0,0.4);

  /* IMPORTANT FIX: prevents right shift */
  box-sizing:border-box;
}

h2{
  text-align:center;
  color:#ffd700;
  margin:5px 0 10px;
  font-size:15px;
}

/* INPUT */
textarea{
  width:100%;
  min-height:50px;
  max-height:120px;
  border-radius:8px;
  border:1px solid rgba(255,215,0,0.6);
  padding:8px;
  resize:none;
  outline:none;
  background:#0b0f1a;
  color:#fff;
  overflow:hidden;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  background: linear-gradient(90deg,#ffd700,#ffb700);
  color:#1a0000;
  font-weight:bold;
  cursor:pointer;
}

/* COMMENTS AREA */
.comments{
  margin-top:10px;
  max-height:180px;
  overflow-y:auto;
  border-top:1px solid rgba(255,215,0,0.4);
  padding-top:8px;
}

/* MESSAGE CARD */
.comment{
  position:relative;
  background: rgba(255,255,255,0.06);
  padding:8px 34px 8px 8px; /* IMPORTANT SPACE FOR DELETE */
  border-radius:8px;
  margin-bottom:8px;
  color:#fff;
  font-size:13px;
  word-break:break-word;
  border-left:3px solid #ffd700;
  box-sizing:border-box;
}

/* 🚫 DELETE BUTTON (FAR RIGHT FIXED) */
.delete{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:#ffd700;
  cursor:pointer;
  font-size:16px;
  padding:0;
}
</style>
</head>

<body>

<div class="main">

  <!-- CHESS -->
  <div class="board-wrapper">
    <div class="title">Royal Neon Chess</div>
    <div class="board" id="board"></div>
  </div>

  <!-- MESSAGE BOX -->
  <div class="container">
    <h2>Royal Message Box</h2>

    <textarea id="input" placeholder="Write your message..."></textarea>
    <button onclick="addComment()">Post Message</button>

    <div class="comments" id="comments"></div>
  </div>

</div>

<script>

/* CHESS */
const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state=[...startState];
const board=document.getElementById("board");

function draw(){
  board.innerHTML="";
  state.forEach((p,i)=>{
    const sq=document.createElement("div");
    const r=Math.floor(i/8),c=i%8;
    sq.className="square "+((r+c)%2?"black":"white");

    if(p){
      const im=document.createElement("img");
      im.className="piece";
      im.src=img[p];
      sq.appendChild(im);
    }
    board.appendChild(sq);
  });
}
draw();

/* COMMENTS */
let comments = JSON.parse(localStorage.getItem("comments")) || [];

function render(){
  const box=document.getElementById("comments");
  box.innerHTML="";

  comments.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="comment";

    const text=document.createElement("div");
    text.textContent=c;

    const del=document.createElement("button");
    del.className="delete";
    del.innerHTML="🚫";

    del.onclick=()=>{
      comments.splice(i,1);
      localStorage.setItem("comments",JSON.stringify(comments));
      render();
    };

    div.appendChild(text);
    div.appendChild(del);
    box.appendChild(div);
  });
}

function addComment(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  comments.push(text);
  localStorage.setItem("comments",JSON.stringify(comments));
  input.value="";
  render();
}

render();

</script>

</body>
</html>
