<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  transition:background 1s ease;
  background:#0F172A;
  color:#E2E8F0;
}

/* SUBTLE BACKGROUND LAYER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(34,197,94,0.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(59,130,246,0.12), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(168,85,247,0.10), transparent 50%);
  z-index:-2;
}

/* RGB BORDER */
.rgbBorder{
  position:fixed;
  inset:0;
  padding:3px;
  background:linear-gradient(
    90deg,
    #ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000
  );
  background-size:400% 400%;
  animation:rgbMove 8s linear infinite;
  z-index:-1;
  filter:blur(0.2px);
}

.rgbBorder::before{
  content:"";
  position:absolute;
  inset:3px;
  background:#0F172A;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}

@keyframes discoRGB{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* MAIN BOX */
.mainBox{
  width:310px;
  margin:20px auto;
  padding:16px;
  text-align:center;

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);

  background:rgba(15,23,42,0.75);
  backdrop-filter: blur(12px);

  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  transition:all 0.6s ease;
}

.themeText{
  transition:all 0.5s ease;
}

/* PIXEL HEADER */
.pixelGlowBox{
  width:270px;
  height:65px;
  margin:auto;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.pixelBorder{
  position:absolute;
  inset:0;
  padding:2px;
  background:linear-gradient(90deg,#22C55E,white,#22C55E);
  background-size:300% 300%;
  animation:discoRGB 6s ease-in-out infinite;
}

.pixelBorder::before{
  content:"";
  position:absolute;
  inset:2px;
  background:rgba(15,23,42,0.9);
  backdrop-filter: blur(8px);
}

#pixelText{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  letter-spacing:2px;
  z-index:2;
  text-shadow:0 0 12px rgba(34,197,94,0.6);
}

/* PLAYER CARD */
.player{
  width:260px;
  margin:10px auto;
  padding:10px;
  border-radius:12px;

  background:rgba(30,41,59,0.35);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);

  transition:0.4s ease;
}

.player:hover{
  transform:translateY(-2px);
}

.live-dot{
  width:8px;
  height:8px;
  background:#22C55E;
  border-radius:50%;
  position:absolute;
  margin-top:-5px;
  margin-left:-5px;
  box-shadow:0 0 10px #22C55E;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.marquee span{
  font-size:11px;
}

/* VIDEO SCREEN */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
.controls button{
  background:rgba(255,255,255,0.06);
  color:#E2E8F0;
  border:1px solid rgba(255,255,255,0.08);
  width:30px;
  height:22px;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s ease;
}

.controls button:hover{
  transform:scale(1.1);
  background:rgba(34,197,94,0.2);
}

/* GAME */
#game{
  width:250px;
  height:250px;
  border-radius:14px;
  background:radial-gradient(circle,#1E293B,#0F172A);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
}

/* CALENDAR */
.calendar{
  width:260px;
  margin:auto;
  padding:12px;
  border-radius:14px;

  background:rgba(30,41,59,0.35);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.header{
  font-weight:700;
  margin-bottom:8px;
}

.dates div{
  padding:6px 0;
  border-radius:6px;
  background:rgba(255,255,255,0.05);
  font-size:11px;
  transition:0.2s;
}

.dates div:hover{
  transform:scale(1.05);
}

.today{
  background:#22C55E !important;
  color:#0F172A;
}

/* PARTNERS */
.section{
  width:270px;
  margin:auto;
  padding:14px;
  border-radius:14px;

  background:rgba(30,41,59,0.35);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.section-title{
  padding:8px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  margin-bottom:10px;
}

.partner-card{
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  margin-bottom:10px;
  transition:0.2s;
}

.partner-card:hover{
  transform:scale(1.04);
  box-shadow:0 0 20px rgba(34,197,94,0.2);
}

.partner-img{
  width:70px;
  height:70px;
  border-radius:12px;
}

.partner-name{
  margin-top:6px;
  font-size:13px;
}

</style>
</head>
