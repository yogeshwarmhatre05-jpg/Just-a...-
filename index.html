<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lichess Puzzle Fixed</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2f3942;
font-family:Arial;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.board{
width:360px;
height:360px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.square{
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:28px;
}

.light{background:#d7d4c0;}
.dark{background:#0f172a;color:white;}

.turn{
color:white;
font-size:18px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="turn" id="status">Loading...</div>

<button onclick="loadPuzzle()">New Puzzle</button>

<div class="board" id="board"></div>

</div>

<!-- SAFE CDN LOAD -->
<script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0/dist/chess.min.js"></script>

<script>

let game;
let boardEl=document.getElementById("board");
let statusEl=document.getElementById("status");

let puzzleMoves=[];
let index=0;
let selected=null;

const pieces={
p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",
P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔"
};

/* INIT SAFE */
function initGame(){
if(typeof Chess==="undefined"){
statusEl.innerText="Chess library failed to load";
return false;
}
game=new Chess();
return true;
}

/* DRAW BOARD */
function draw(){

if(!game) return;

boardEl.innerHTML="";

let b=game.board();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let sq=document.createElement("div");
sq.className="square "+((r+c)%2?"dark":"light");

let p=b[r][c];
if(p){
sq.innerText=pieces[p.type===p.type.toLowerCase()?p.type:p.type.toUpperCase()];
}

let square="abcdefgh"[c]+(8-r);

sq.onclick=()=>click(square);

boardEl.appendChild(sq);
}
}

statusEl.innerText=game.turn()==="w"?"White to move":"Black to move";
}

/* CLICK */
function click(square){

if(!selected){
selected=square;
return;
}

let move=game.move({
from:selected,
to:square,
promotion:"q"
});

if(move){
check(move.from+move.to);
}

selected=null;
draw();
}

/* PUZZLE LOGIC */
function check(uci){

if(!puzzleMoves.length) return;

if(puzzleMoves[index]===uci){
index++;

if(index>=puzzleMoves.length){
statusEl.innerText="Solved!";
return;
}

setTimeout(()=>{
let m=puzzleMoves[index];
game.move({from:m.slice(0,2),to:m.slice(2,4)});
index++;
draw();
},400);

}else{
statusEl.innerText="Wrong move!";
}
}

/* LOAD PUZZLE */
async function loadPuzzle(){

if(!initGame()) return;

statusEl.innerText="Loading...";

try{
let res=await fetch("https://lichess.org/api/puzzle/daily");
let data=await res.json();

game=new Chess(data.game.fen);

puzzleMoves=data.puzzle.solution;
index=0;

draw();

statusEl.innerText="Solve it";

}catch(e){
statusEl.innerText="Puzzle load failed";
console.log(e);
}
}

initGame();
draw();

</script>

</body>
</html>
