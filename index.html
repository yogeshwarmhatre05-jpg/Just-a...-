<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050b1a;
  font-family:Arial;
}

.board{
  width:420px;
  height:420px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:10px solid #020617;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.white{ background:#0ea5e9; }
.black{ background:#075985; }

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  user-select:none;
  transition:0.3s;
}

/* coordinates */
.coord{
  position:absolute;
  font-size:12px;
  color:#cbd5e1;
  font-weight:bold;
}

.file{
  bottom:-18px;
}

.rank{
  left:-18px;
}

/* title */
.title{
  position:absolute;
  top:-45px;
  color:white;
  font-size:15px;
  font-weight:bold;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="board" id="board">
  <div class="title">
    Magnus Carlsen vs Veselin Topalov (2010)
  </div>
</div>

<script>

/* PIECES */
const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",

  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

/* START POSITION */
const startState = [
  "r","n","b","q","k","b","n","r",
  "p","p","p","p","p","p","p","p",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "P","P","P","P","P","P","P","P",
  "R","N","B","Q","K","B","N","R"
];

let state = [...startState];

/* MAGNUS vs TOPALOV 2010 */
const moves = [

[51,35],[11,27],
[50,34],[12,20],
[57,42],[6,21],
[62,45],[5,12],
[61,34],[4,6],
[52,44],[10,26],
[35,26],[12,26],
[48,40],[1,18],
[59,50],[3,31],
[56,59],[12,4],
[61,52],[27,34],
[52,34],[20,36],
[34,41],[36,28],
[41,21],[12,21],
[50,36],[21,42],
[49,42],[31,42],
[45,51],[18,28],
[60,62],[28,42],
[51,42],[12,20],
[59,58],[42,21],
[50,13],[7,5],
[21,11],[5,1],
[13,20],[31,21],
[11,12],[1,3],
[58,50],[3,27],
[50,53],[15,23],
[47,39],[0,1],
[62,55],[1,17],
[12,28],[3,59],
[28,59],[31,40],
[59,35],[17,9],
[55,46],[9,17],
[46,21],[14,21],
[35,45],[17,9],
[45,5]
];

const board = document.getElementById("board");

/* DRAW */
function draw(){

  board.querySelectorAll(".square,.coord").forEach(e=>e.remove());

  state.forEach((p,i)=>{

    const sq = document.createElement("div");

    const r = Math.floor(i/8);
    const c = i%8;

    sq.className =
      "square " + ((r+c)%2 ? "black" : "white");

    if(p){
      const im = document.createElement("img");
      im.className = "piece";
      im.src = img[p];
      sq.appendChild(im);
    }

    board.appendChild(sq);

  });

  addCoords();
}

/* COORDS */
function addCoords(){

  const files = ["A","B","C","D","E","F","G","H"];

  for(let i=0;i<8;i++){

    let f = document.createElement("div");

    f.className = "coord file";
    f.style.left = (i*52 + 18) + "px";
    f.textContent = files[i];

    board.appendChild(f);
  }

  for(let i=0;i<8;i++){

    let r = document.createElement("div");

    r.className = "coord rank";
    r.style.top = (i*52 + 18) + "px";
    r.textContent = 8-i;

    board.appendChild(r);
  }
}

/* RESET */
function resetBoard(){

  state = [...startState];
  draw();
  moveIndex = 0;
}

/* PLAY LOOP */
let moveIndex = 0;

function play(){

  if(moveIndex >= moves.length){

    setTimeout(()=>{
      resetBoard();
      play();
    },2500);

    return;
  }

  setTimeout(()=>{

    const [from,to] = moves[moveIndex];

    state[to] = state[from];
    state[from] = "";

    moveIndex++;

    draw();

    play();

  },650);
}

/* START */
draw();
play();

</script>

</body>
</html>
