<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lichess Style Puzzles</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2f3942;
font-family:Arial;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.board{
width:360px;
height:360px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.square{
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:28px;
}

.light{background:#d7d4c0;}
.dark{background:#0f172a;color:white;}

.turn{
color:white;
font-size:20px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="turn" id="status">Loading...</div>

<button onclick="loadPuzzle()">New Puzzle</button>

<div class="board" id="board"></div>

</div>

<script>

const boardEl=document.getElementById("board");
const statusEl=document.getElementById("status");

let game=new Chess();

let puzzleMoves=[];
let moveIndex=0;

let selected=null;

/* Unicode pieces */
const pieces={
p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",
P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔"
};

function draw(){

boardEl.innerHTML="";

let board=game.board();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let square=document.createElement("div");
square.className="square "+((r+c)%2===0?"light":"dark");

let piece=board[r][c];

if(piece){
square.innerText=pieces[piece.type===piece.type.toLowerCase()?piece.type:piece.type.toUpperCase()];
}

let file="abcdefgh"[c];
let rank=8-r;
let sq=file+rank;

square.onclick=()=>onSquareClick(sq);

boardEl.appendChild(square);
}
}
statusEl.innerText=game.turn()==="w"?"White to move":"Black to move";
}

/* convert e2e4 -> {from:e2,to:e4} */
function parseMove(m){
return {from:m.slice(0,2),to:m.slice(2,4)};
}

function onSquareClick(square){

if(!selected){
selected=square;
return;
}

let move={
from:selected,
to:square,
promotion:"q"
};

let result=game.move(move);

if(result){
handlePuzzleMove(move.from+move.to);
}

selected=null;
draw();
}

/* PUZZLE LOGIC */

function handlePuzzleMove(uci){

if(!puzzleMoves.length) return;

/* correct move */
if(puzzleMoves[moveIndex]===uci){

moveIndex++;

/* if puzzle finished */
if(moveIndex>=puzzleMoves.length){
statusEl.innerText="Puzzle Solved!";
return;
}

/* auto opponent move */
setTimeout(()=>{
let bot=parseMove(puzzleMoves[moveIndex]);
game.move(bot);
moveIndex++;
draw();
},500);

}else{
statusEl.innerText="Wrong move!";
}
}

/* LOAD LICHESS PUZZLE */

async function loadPuzzle(){

statusEl.innerText="Loading puzzle...";

let res=await fetch("https://lichess.org/api/puzzle/daily");
let data=await res.json();

game=new Chess(data.game.fen);

/* solution line */
puzzleMoves=data.puzzle.solution;
moveIndex=0;

draw();

statusEl.innerText="Solve the puzzle";
}

loadPuzzle();
draw();

</script>

</body>
</html>
